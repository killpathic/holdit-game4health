services:
  api:
    build: ./api
    image: holdit-api:0.1.0
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    # Uncomment when an ESP32 is connected over USB-serial.
    # The current Unity client talks to the ESP32 over WiFi HTTP,
    # so the device mount is optional for now.
    # devices:
    #   - "/dev/ttyUSB0:/dev/ttyUSB0"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15.10-alpine
    environment:
      POSTGRES_DB: holdit
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d holdit"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
